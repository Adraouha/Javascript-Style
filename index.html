<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicios JS</title>

    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h1>Ejercicios JS + CSS</h1>
    <p>Cómo modificar el CSS con JS</p><br>

    <!-- EJERCICIO 1 -->
    <h2>¡Dime tu edad, te diré quién eres!</h2>

    <input type="number" id="edad" placeholder="Introduce tu edad">

    <button id="btnEdad" onclick="comprobarEdad()">
        ¡Descúbrete!
    </button>

    <div id="resultado"></div>

    <!-- EJERCICIO 2 -->
    <h2>Mensaje secreto</h2>

    <div class="caja" id="caja">
        <p id="mensajeSecreto">
            Soy tu secreto mejor guardado...
        </p>
    </div>

    <button onclick="descubrirMensaje()">
        ¡Abracadabra!
    </button>

    <!-- EJERCICIO 3 -->
    <h2>¡La pelota se mueve!</h2>

    <div class="pelota" id="pelota"></div>

    <button onclick="pararAnimacion()">
        Parar
    </button>

    <button onclick="arrancarAnimacion()">
        Arrancar
    </button>


    <script src="script.js"></script>

</body>

</html>
